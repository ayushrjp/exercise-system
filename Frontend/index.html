<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Pro - Production Analytics</title>
    <meta name="description"
        content="Professional real-time AI fitness analytics dashboard with skeletal tracking and performance metrics.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#020617',
                        card: '#0f172a',
                        primary: '#10b981',
                        accent: '#38bdf8',
                        warning: '#f59e0b',
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .glass:hover {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(15, 23, 42, 0.85);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .neon-glow-primary {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #10b981 50%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.2));
        }

        .text-highlight {
            position: relative;
            z-index: 1;
        }

        .text-highlight::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 4px;
            width: 100%;
            height: 8px;
            background: rgba(16, 185, 129, 0.2);
            z-index: -1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        .chart-container .recharts-cartesian-grid-horizontal line {
            stroke: rgba(255, 255, 255, 0.05);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        n .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }

        .blinking-dot {
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Modern Login Enhancements */
        .login-bg {
            background: radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                        #020617;
            position: relative;
            overflow: hidden;
        }

        .neon-blur {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        .btn-primary-glow {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }

        .btn-primary-glow:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
        }

        .btn-primary-glow:active:not(:disabled) {
            transform: scale(0.98);
        }

        .visual-panel {
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .visual-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent, #020617);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .floating {
            animation: float 4s ease-in-out infinite;
        }

        .grain-bg {
            position: absolute;
            inset: 0;
            opacity: 0.02;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.4); }
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 6px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: #10b981;
        }
    </style>
</head>

<body>
    <div id="root">
        <div className="flex items-center justify-center min-h-screen">
            <h1 className="text-white text-2xl animate-pulse">Initializing Neural Interface...</h1>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const {
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip,
            ResponsiveContainer, AreaChart, Area, ReferenceLine
        } = Recharts;

        // Always point to the Flask server (same origin since Flask serves this page)
        const API_BASE = window.location.origin.startsWith('file')
            ? "http://localhost:5000"
            : (window.location.origin === "null" ? "http://localhost:5000" : window.location.origin);

        // Global fetch wrapper — handles credentials and errors
        const apiFetch = async (url, options = {}) => {
            console.debug(`[apiFetch] Calling: ${url}`);
            try {
                const res = await fetch(url, {
                    ...options,
                    credentials: 'include', // CRITICAL for cookies
                    headers: {
                        'Content-Type': 'application/json',
                        ...(options.headers || {})
                    }
                });
                return res;
            } catch (err) {
                console.error(`[apiFetch] Network error for ${url}:`, err);
                throw err;
            }
        };

        const Icon = ({ name, size = 20, color = "currentColor", className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, stroke: color }}></i>;
        };        const Auth = ({ onLogin }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [name, setName] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError("");
                setLoading(true);
                try {
                    const endpoint = isLogin ? "/login" : "/signup";
                    const payload = isLogin ? { email, password } : { name, email, password };
                    const res = await apiFetch(`${API_BASE}${endpoint}`, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (res.ok) {
                        if (isLogin) onLogin(data.user);
                        else {
                            setIsLogin(true);
                            setError("Account created! Please login.");
                        }
                    } else {
                        setError(data.error || "Authentication failed");
                    }
                } catch (err) {
                    setError("Server connection failed");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex login-bg">
                    {/* Decorative Neon Blurs */}
                    <div className="neon-blur bg-primary top-[-200px] left-[-200px]"></div>
                    <div className="neon-blur bg-accent bottom-[-200px] right-[-200px]"></div>

                    {/* Left Panel: Visual Storytelling */}
                    <div className="hidden lg:flex lg:w-3/5 visual-panel flex-col justify-center p-24 z-10 overflow-hidden" 
                         style={{ backgroundImage: 'url("auth_bg.png")', backgroundOpacity: 0.1 }}>
                        <div className="absolute inset-0 bg-dark/85 backdrop-blur-[4px]"></div>
                        
                        <div className="max-w-xl floating relative z-20">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="p-3 bg-primary/20 backdrop-blur-xl rounded-2xl border border-primary/20 neon-glow-primary">
                                    <Icon name="activity" size={40} className="text-primary" />
                                </div>
                                <div>
                                    <span className="text-4xl font-black tracking-tighter text-white block">NEURONFIT</span>
                                    <div className="live-indicator mt-1">
                                        <div className="w-1.5 h-1.5 rounded-full bg-primary blinking-dot"></div>
                                        LIVE AI SYSTEM
                                    </div>
                                </div>
                            </div>
                            
                            <h1 className="text-6xl font-extrabold text-white leading-tight mb-8">
                                Intelligence <br />
                                <span className="gradient-text">In Every Move.</span>
                            </h1>
                            
                            <div className="space-y-6 mb-12">
                                {[
                                    { text: "Real-time 3D skeletal tracking", icon: "maximize", color: "text-primary" },
                                    { text: "Dynamic form analysis & scoring", icon: "activity", color: "text-accent" },
                                    { text: "End-to-end encrypted logs", icon: "shield-check", color: "text-primary" }
                                ].map((item, idx) => (
                                    <div key={idx} className="flex items-center gap-5 text-slate-300 font-medium group cursor-default">
                                        <div className="p-2.5 bg-white/5 rounded-2xl border border-white/10 group-hover:border-primary/50 transition-all duration-500">
                                            <Icon name={item.icon} size={20} className={item.color} />
                                        </div>
                                        <span className="text-xl tracking-tight group-hover:text-white transition-colors">{item.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="mt-auto flex gap-6 relative z-20">
                            {[
                                { label: "Model Accuracy", value: "99.2%", icon: "target" },
                                { label: "Processing", value: "15ms", icon: "zap" },
                                { label: "Engine State", value: "Optimal", icon: "check-circle" }
                            ].map((stat, i) => (
                                <div key={i} className="flex-1 p-5 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-md">
                                    <div className="flex items-center gap-2 text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">
                                        <Icon name={stat.icon} size={14} className="text-primary" />
                                        {stat.label}
                                    </div>
                                    <div className="text-2xl font-black text-white">{stat.value}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Right Panel: Login Form */}
                    <div className="flex-1 flex items-center justify-center p-6 sm:p-12 z-10 relative">
                        <div className="grain-bg"></div>
                        <div className="glass w-full max-w-md p-10 border-white/10 shadow-2xl relative overflow-hidden">
                            {/* Ambient background glow */}
                            <div className="absolute -top-20 -right-20 w-64 h-64 bg-primary/10 blur-[100px] rounded-full"></div>
                            <div className="absolute -bottom-20 -left-20 w-64 h-64 bg-accent/10 blur-[100px] rounded-full"></div>
                            
                            <div className="lg:hidden flex flex-col items-center gap-2 mb-10">
                                <div className="flex items-center gap-2">
                                    <div className="p-2 bg-primary/20 rounded-lg"><Icon name="activity" size={24} className="text-primary" /></div>
                                    <span className="text-xl font-bold tracking-tighter text-white uppercase">NeuronFit</span>
                                </div>
                                <div className="live-indicator scale-75">
                                    <div className="w-1.5 h-1.5 rounded-full bg-primary blinking-dot"></div>
                                    LIVE AI SYSTEM
                                </div>
                            </div>

                            <div className="mb-10">
                                <h2 className="text-3xl font-bold text-white mb-2">
                                    {isLogin ? "Neural Access" : "Join the Lab"}
                                </h2>
                                <p className="text-slate-400 text-sm font-medium">
                                    {isLogin ? "AI-powered fitness intelligence" : "Start your professional tracking journey"}
                                </p>
                            </div>

                            {error && (
                                <div className="mb-6 p-4 bg-danger/10 border border-danger/20 text-danger text-xs font-bold rounded-2xl flex items-center gap-3 fade-in">
                                    <Icon name="alert-circle" size={18} />
                                    {error}
                                </div>
                            )}

                            <form onSubmit={handleSubmit} className="space-y-6">
                                {!isLogin && (
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 block">Full Name</label>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                                <Icon name="user" size={18} />
                                            </div>
                                            <input
                                                type="text"
                                                required
                                                placeholder="John Doe"
                                                className="w-full input-glass rounded-2xl pl-12 pr-4 py-4 text-white placeholder:text-slate-600 outline-none"
                                                value={name}
                                                onChange={(e) => setName(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                )}
                                
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1 block">Email Intelligence</label>
                                    <div className="relative group">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                            <Icon name="mail" size={18} />
                                        </div>
                                        <input
                                            type="email"
                                            required
                                            placeholder="operator@neuronfit.ai"
                                            className="w-full input-glass rounded-2xl pl-12 pr-4 py-4 text-white placeholder:text-slate-600 outline-none"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <div className="flex justify-between items-center ml-1">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">Access Key</label>
                                        {isLogin && <a href="#" className="text-[10px] font-bold text-primary hover:text-white transition-colors uppercase tracking-widest">Forgot?</a>}
                                    </div>
                                    <div className="relative group">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                            <Icon name="lock" size={18} />
                                        </div>
                                        <input
                                            type="password"
                                            required
                                            placeholder="••••••••"
                                            className="w-full input-glass rounded-2xl pl-12 pr-4 py-4 text-white placeholder:text-slate-600 outline-none"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full btn-primary-glow py-4 rounded-2xl text-dark font-black uppercase tracking-widest flex items-center justify-center gap-3 disabled:opacity-70 disabled:cursor-not-allowed mt-8"
                                >
                                    {loading ? (
                                        <>
                                            <div className="w-5 h-5 border-2 border-dark/30 border-t-dark rounded-full animate-spin"></div>
                                            Authenticating...
                                        </>
                                    ) : (
                                        <>
                                            {isLogin ? "Initialize Session" : "Create Profile"}
                                            <Icon name="arrow-right" size={18} />
                                        </>
                                    )}
                                </button>
                            </form>

                            <div className="mt-10 text-center">
                                <p className="text-slate-500 text-xs font-medium">
                                    {isLogin ? "New to the platform?" : "Already have an account?"}
                                    <button
                                        onClick={() => setIsLogin(!isLogin)}
                                        className="ml-2 text-primary font-bold hover:underline"
                                    >
                                        {isLogin ? "Sign Up Now" : "Sign In Here"}
                                    </button>
                                </p>
                            </div>
                            
                            <div className="mt-12 pt-8 border-t border-white/5 flex justify-between items-center text-[9px] font-bold text-slate-600 uppercase tracking-[0.2em]">
                                <span>v2.4.0 Stable</span>
                                <span>Secure Neural Link</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, onLogout }) => {
            const [workoutData, setWorkoutData] = useState([]);
            const [summary, setSummary] = useState(null);
            const [error, setError] = useState(null);
            const [lastUpdated, setLastUpdated] = useState(new Date());
            const [showModal, setShowModal] = useState(false);
            const [videoError, setVideoError] = useState(false);
            const [videoKey, setVideoKey] = useState(0);  // used to force-reload camera img
            const [voiceEnabled, setVoiceEnabled] = useState(true);
            const [feedback, setFeedback] = useState({ message: "Awaiting movement...", type: "info" });
            const [sessionTime, setSessionTime] = useState(0);
            const [isSessionActive, setIsSessionActive] = useState(true);
            const [activeTab, setActiveTab] = useState("dashboard");
            const [sessionMetrics, setSessionMetrics] = useState(null);
            const [evaluating, setEvaluating] = useState(false);
            const [showAdvanced, setShowAdvanced] = useState(false);
            const [pastSessions, setPastSessions] = useState([]);


            const scoreDetails = useMemo(() => {
                if (!sessionMetrics) return null;
                const correct = sessionMetrics.confusion_matrix.tp + sessionMetrics.confusion_matrix.fn;
                const total = sessionMetrics.total_reps;
                const score = total > 0 ? Math.round((correct / total) * 100) : 0;

                if (score >= 90) return { score, label: "Excellent", color: "text-primary", bg: "bg-primary/20", border: "border-primary/30" };
                if (score >= 75) return { score, label: "Good", color: "text-accent", bg: "bg-accent/20", border: "border-accent/30" };
                if (score >= 60) return { score, label: "Needs Improvement", color: "text-warning", bg: "bg-warning/20", border: "border-warning/30" };
                return { score, label: "Poor", color: "text-danger", bg: "bg-danger/20", border: "border-danger/30" };
            }, [sessionMetrics]);

            const coachingInsights = useMemo(() => {
                if (!sessionMetrics) return [];
                const insights = [];
                const score = scoreDetails?.score || 0;

                if (score >= 85) insights.push({ text: "Your squat depth is perfect!", type: "success", icon: "check-circle" });
                else insights.push({ text: "Squat depth was slightly inconsistent.", type: "warning", icon: "alert-circle" });

                insights.push({ text: "Knee alignment is correct and stable.", type: "success", icon: "shield-check" });

                if (sessionMetrics.total_reps > 10) {
                    insights.push({ text: "Form consistency improved over time.", type: "info", icon: "trending-up" });
                }

                if (sessionMetrics.total_reps > 15) {
                    insights.push({ text: "Slight fatigue detected in last reps.", type: "danger", icon: "zap" });
                }

                return insights;
            }, [sessionMetrics, scoreDetails]);

            const recommendations = useMemo(() => {
                if (!sessionMetrics) return [];
                const recs = [];
                const score = scoreDetails?.score || 0;

                if (score < 85) recs.push("Try to go deeper in your next squat session.");
                recs.push("Focus on keeping your back straight throughout the movement.");
                recs.push("Control your movement speed for better muscle engagement.");

                return recs;
            }, [sessionMetrics, scoreDetails]);



            const lastRepCount = useRef(-1);
            const lastFeedbackMsg = useRef("");
            const idleTimer = useRef(null);
            const IDLE_TIMEOUT_SEC = 15;
            const synth = window.speechSynthesis;


            const speak = (text) => {
                if (!voiceEnabled || !synth || text === lastFeedbackMsg.current) return;
                synth.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                utter.rate = 1.1;
                utter.pitch = 1.0;
                synth.speak(utter);
                lastFeedbackMsg.current = text;
            };

            const calculateFeedback = (sum) => {
                if (!sum.person_detected) {
                    return { message: "Please stand in frame", type: "warning" };
                }

                const score = sum.live_score || 0;
                const knee = sum.angles?.knee || 0;

                if (score >= 85) return { message: "Perfect form! Keep it up.", type: "success" };
                if (score >= 70) return { message: "Good effort. Watch your depth.", type: "info" };

                if (knee > 100 && sum.last_exercise === "Squat") return { message: "Go deeper for maximum effect!", type: "warning" };
                return { message: "Correct your posture", type: "danger" };
            };

            const fetchData = async () => {
                if (!isSessionActive) return;
                try {
                    const [dataRes, summaryRes] = await Promise.all([
                        apiFetch(`${API_BASE}/data`),
                        apiFetch(`${API_BASE}/summary`)
                    ]);

                    // 401 means session expired — show a message but don't loop logout
                    if (dataRes.status === 401 || summaryRes.status === 401) {
                        console.warn("Session check failed (401). Retrying...");
                        if (!window._authErrorCount) window._authErrorCount = 0;
                        window._authErrorCount++;
                        
                        if (window._authErrorCount > 5) { // Increased threshold to 5
                            console.error("Critical Auth Failure: Too many 401s.");
                            setError("Session expired. Please log in again.");
                            setTimeout(() => { 
                                window._authErrorCount = 0;
                                onLogout(); 
                            }, 3000);
                        }
                        return;
                    }
                    window._authErrorCount = 0;

                    if (!dataRes.ok || !summaryRes.ok) {
                        throw new Error("API error");
                    }

                    const data = await dataRes.json();
                    const sum = await summaryRes.json();

                    setWorkoutData(data);
                    setSummary(sum);
                    setLastUpdated(new Date());
                    setError(null);

                    const newFeedback = calculateFeedback(sum);
                    setFeedback(newFeedback);
                    speak(newFeedback.message);

                    if (sum.total_reps > 0 && lastRepCount.current !== -1 && sum.total_reps !== lastRepCount.current) {
                        lastRepCount.current = sum.total_reps;
                        if (idleTimer.current) clearTimeout(idleTimer.current);
                        idleTimer.current = setTimeout(() => setShowModal(true), IDLE_TIMEOUT_SEC * 1000);
                    }
                    if (lastRepCount.current === -1) lastRepCount.current = sum.total_reps;
                } catch (err) {
                    setError("Backend Unreachable. Please run 'python src/api.py'");
                }
            };

                    const res = await apiFetch(`${API_BASE}/session/current/evaluate`, { method: 'POST' });

                    setSessionMetrics(result.metrics);
                    setActiveTab("summary");
                    setShowModal(false);

                    setError("Evaluation failed. Server might be busy.");

                    setEvaluating(false);

            const fetchPastSessions = async () => {
                try {
                    const res = await apiFetch(`${API_BASE}/sessions`);

                        setPastSessions(data);

            const chartData = useMemo(() => {
                if (!workoutData || workoutData.length === 0) return [];
                return workoutData.slice(-20).map((d, i) => ({

            const insights = useMemo(() => {

                const list = [];
                const score = summary.live_score || summary.last_score || 0;

                // Score based logic
                if (score >= 85) {
                    list.push({ type: 'success', text: 'Good depth! Keep it up.', icon: 'check-circle' });
                    list.push({ type: 'success', text: 'Knee alignment is correct.', icon: 'shield-check' });
                } else if (score >= 70) {
                    list.push({ type: 'warning', text: 'Minor correction needed.', icon: 'alert-circle' });
                    list.push({ type: 'warning', text: 'Keep your back straight.', icon: 'chevron-up' });

                    list.push({ type: 'danger', text: 'Improve squat depth.', icon: 'arrow-down' });

                if (workoutData.length >= 5) {

                    const avgRecent = recent.reduce((a, b) => a + b, 0) / recent.length;
                    const prev = workoutData.slice(-10, -5).map(d => d.score || 0);
                    if (prev.length > 0) {
                        const avgPrev = prev.reduce((a, b) => a + b, 0) / prev.length;
                        const diff = Math.round(avgRecent - avgPrev);
                        if (diff > 0) list.push({ type: 'success', text: `Consistency improving (+${diff}%)`, icon: 'trending-up' });

                                                    <div className="p-4 bg-white/5 rounded-xl border border-white/10">
                                                        <div className="text-[10px] text-slate-500 uppercase font-bold mb-1">False Positives</div>
                                                        <div className="text-2xl font-bold text-warning">{sessionMetrics.confusion_matrix.fp}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-center pt-10">
                                    <button onClick={() => window.location.reload()} className="px-12 py-5 bg-primary text-dark font-black rounded-2xl hover:scale-105 transition-transform shadow-xl shadow-primary/20">
                                        START NEW WORKOUT SESSION
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 fade-in">
                                <div className="glass p-8 min-h-[400px]">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-2xl font-bold text-white">Saved Sessions</h2>
                                        <button onClick={fetchPastSessions} className="p-2 hover:bg-white/5 rounded-lg transition-colors">
                                            <Icon name="refresh-cw" size={18} className="text-slate-400" />
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {pastSessions.map((s, i) => (
                                            <div key={i} className="glass p-5 border-white/5 hover:border-primary/30 transition-all group">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="p-2 bg-primary/10 rounded-lg"><Icon name="calendar" size={18} className="text-primary" /></div>
                                                    <button onClick={() => deleteSession(s.session_id)} className="p-1 text-slate-600 hover:text-danger opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <Icon name="trash-2" size={14} />
                                                    </button>
                                                </div>
                                                <div className="text-sm font-bold text-white mb-1">{new Date(s.start_time).toLocaleDateString()}</div>
                                                <div className="text-[10px] text-slate-500 uppercase tracking-widest mb-4">{new Date(s.start_time).toLocaleTimeString()}</div>
                                                
                                                <div className="grid grid-cols-2 gap-4 mb-4 pb-4 border-b border-white/5">
                                                    <div>
                                                        <div className="text-[9px] text-slate-500 uppercase font-bold">Reps</div>
                                                        <div className="text-lg font-bold text-white">{s.total_reps}</div>
                                                    </div>
                                                    <div>
                                                        <div className="text-[9px] text-slate-500 uppercase font-bold">Avg Score</div>
                                                        <div className="text-lg font-bold text-primary">{s.avg_score}%</div>
                                                    </div>
                                                </div>
                                                
                                                <button 
                                                    onClick={() => viewSessionReport(s.session_id)}
                                                    className="w-full py-2 bg-white/5 border border-white/10 rounded-lg text-xs font-bold hover:bg-primary hover:text-dark transition-all"
                                                >
                                                    View Detailed Report
                                                </button>
                                            </div>
                                        ))}
                                        {pastSessions.length === 0 && (
                                            <div className="col-span-full py-20 text-center text-slate-500 border-2 border-dashed border-white/5 rounded-3xl">
                                                <Icon name="history" size={48} className="mx-auto mb-4 opacity-10" />
                                                <p>No sessions recorded yet.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="glass p-8">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-xl font-bold text-white">Current Session Log</h2>
                                        <div className="px-4 py-2 bg-white/5 rounded-lg border border-white/10 text-xs text-slate-400">
                                            Last {workoutData.length} events
                                        </div>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="text-[10px] font-bold text-slate-500 uppercase tracking-widest border-b border-white/5">
                                                    <th className="pb-4">Time</th>
                                                    <th className="pb-4">Exercise</th>
                                                    <th className="pb-4">Rep #</th>
                                                    <th className="pb-4">Form Score</th>
                                                    <th className="pb-4">Movement</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {[...workoutData].reverse().slice(0, 10).map((log, i) => (
                                                    <tr key={i} className="border-b border-white/5 hover:bg-white/5 transition-colors group">
                                                        <td className="py-4 text-slate-400">{log.time?.split(' ')[1]?.split('.')[0] || 'N/A'}</td>
                                                        <td className="py-4 font-bold text-white uppercase tracking-tight">{log.exercise}</td>
                                                        <td className="py-4">
                                                            <span className="px-2 py-1 bg-accent/20 text-accent rounded text-[10px] font-bold">REP {log.reps}</span>
                                                        </td>
                                                        <td className="py-4">
                                                            <div className="flex items-center gap-2">
                                                                <div className={`w-2 h-2 rounded-full ${log.score >= 85 ? 'bg-primary' : log.score >= 70 ? 'bg-warning' : 'bg-danger'}`}></div>
                                                                <span className="font-mono">{log.score}%</span>
                                                            </div>
                                                        </td>
                                                        <td className="py-4 text-slate-500 capitalize">{log.stage}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}


                        {/* Modal */}
                        {showModal && (
                            <div className="fixed inset-0 bg-dark/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
                                <div className="glass p-10 max-w-md w-full text-center border-primary/20 shadow-2xl shadow-primary/10">
                                    <div className="w-20 h-20 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                        <Icon name="award" size={40} className="text-primary" />
                                    </div>
                                    <h2 className="text-3xl font-bold text-white mb-2">Session Complete!</h2>
                                    <p className="text-slate-400 mb-8">Performance metrics successfully logged.</p>

                                    <div className="grid grid-cols-3 gap-4 mb-8">
                                        <div className="p-4 bg-white/5 rounded-2xl">
                                            <div className="text-[10px] font-bold text-slate-500 uppercase mb-1">Reps</div>
                                            <div className="text-2xl font-bold text-white">{summary?.total_reps}</div>
                                        </div>
                                        <div className="p-4 bg-white/5 rounded-2xl">
                                            <div className="text-[10px] font-bold text-slate-500 uppercase mb-1">Score</div>
                                            <div className="text-2xl font-bold text-white">{summary?.avg_score}%</div>
                                        </div>
                                        <div className="p-4 bg-white/5 rounded-2xl">
                                            <div className="text-[10px] font-bold text-slate-500 uppercase mb-1">Time</div>
                                            <div className="text-2xl font-bold text-white">{new Date(sessionTime * 1000).toISOString().substr(14, 5)}</div>
                                        </div>
                                    </div>

                                    <div className="flex gap-4">
                                        <button onClick={() => { setIsSessionActive(true); setShowModal(false); }} className="flex-1 py-4 bg-white/10 text-white font-bold rounded-2xl hover:bg-white/20 transition-colors">
                                            Resume
                                        </button>
                                        <button
                                            disabled={evaluating}
                                            onClick={handleEndSession}
                                            className="flex-1 py-4 bg-primary text-dark font-bold rounded-2xl hover:opacity-90 transition-opacity disabled:opacity-50"
                                        >
                                            {evaluating ? "Evaluating..." : "Generate Report"}
                                        </button>
                                    </div>

                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                console.log("%c NEURONFIT INITIALIZED ", "background: #10b981; color: #020617; font-weight: bold; padding: 4px;");
                console.log(`Current Origin: ${window.location.origin}`);
                console.log(`Target API: ${API_BASE}`);
                checkSession();
            }, []);

            const checkSession = async () => {
                try {
                    const res = await apiFetch(`${API_BASE}/me`);
                    if (res.ok) {
                        const data = await res.json();
                        setUser(data);
                    }
                } catch (err) {
                    console.error("Session check failed");
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = async () => {
                await apiFetch(`${API_BASE}/logout`, { method: 'POST' });
                setUser(null);
            };

            if (loading) return (
                <div className="flex items-center justify-center min-h-screen bg-dark">
                    <h1 className="text-white text-2xl animate-pulse">Initializing Lab Interface...</h1>
                </div>
            );

            return user ? (
                <Dashboard user={user} onLogout={handleLogout} />
            ) : (
                <Auth onLogin={setUser} />
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
